name: Shop Sphere CI

on:
    push:
        branches:
            - main
            - develop

    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install Dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run Tests
              run: npm test

            - name: Build Project
              run: npm run build

            - name: Upload Build
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist
