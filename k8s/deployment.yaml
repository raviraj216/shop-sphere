apiVersion: apps/v1

kind: Deployment

metadata:
  name: shop-sphere-api

  namespace: shop-sphere

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shop-sphere-api

  template:
    metadata:
      labels:
        app: shop-sphere-api

    spec:
      containers:
        - name: api

          image: your-dockerhub-username/shopsphere-api:latest

          ports:
            - containerPort: 5000
